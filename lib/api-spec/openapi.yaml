openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: AI PPT Generation Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: ppt
    description: PPT generation operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /ppt/generate:
    post:
      operationId: generatePPT
      tags: [ppt]
      summary: Generate PPT
      description: Generate a PPTX file using AI based on topic and requirements
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeneratePPTRequest"
      responses:
        "200":
          description: PPT generation job started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratePPTResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ppt/status/{jobId}:
    get:
      operationId: getPPTStatus
      tags: [ppt]
      summary: Get PPT generation status
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PPTJobStatus"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ppt/download/{jobId}:
    get:
      operationId: downloadPPT
      tags: [ppt]
      summary: Download generated PPTX file
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PPTX file download
          content:
            application/vnd.openxmlformats-officedocument.presentationml.presentation:
              schema:
                type: string
                format: binary
        "404":
          description: File not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ppt/history:
    get:
      operationId: getPPTHistory
      tags: [ppt]
      summary: Get generation history
      responses:
        "200":
          description: List of generation history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PPTHistoryResponse"

  /ppt/export:
    post:
      operationId: exportPPT
      tags: [ppt]
      summary: Export edited PPT
      description: Build and download a PPTX file from a user-edited outline without rerunning AI generation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportPPTRequest"
      responses:
        "200":
          description: PPTX file download
          content:
            application/vnd.openxmlformats-officedocument.presentationml.presentation:
              schema:
                type: string
                format: binary
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ppt/continue:
    post:
      operationId: continuePPT
      tags: [ppt]
      summary: Continue PPT generation from outline
      description: Continue enriching content and building the PPTX file from a confirmed outline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContinuePPTRequest"
      responses:
        "200":
          description: PPT generation resumed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratePPTResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ppt/regenerate-slide:
    post:
      operationId: regenerateSlide
      tags: [ppt]
      summary: Regenerate a single slide
      description: Regenerate one slide from the current outline context without rerunning the full job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegenerateSlideRequest"
      responses:
        "200":
          description: Regenerated slide content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlideOutlineItem"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    GeneratePPTRequest:
      type: object
      properties:
        topic:
          type: string
          description: Main topic of the presentation
        language:
          type: string
          description: Language for the presentation (zh/en)
          default: zh
        slideCount:
          type: integer
          description: Number of slides
          default: 10
        style:
          type: string
          description: Presentation style (professional/creative/minimal/academic)
          default: professional
        themePreset:
          type: string
          description: Visual theme preset key
          default: professional
        primaryColor:
          type: string
          description: Optional custom primary color in hex format
        audience:
          type: string
          description: Target audience description
        additionalRequirements:
          type: string
          description: Additional requirements or context
        useAgentSkills:
          type: boolean
          description: Whether to use agent skills for enhanced content
          default: true
        generationMode:
          type: string
          enum: [outline-only, full]
          description: Whether to stop after planning the outline or continue through full PPT generation
          default: full
      required:
        - topic

    GeneratePPTResponse:
      type: object
      properties:
        jobId:
          type: string
        message:
          type: string
        estimatedTime:
          type: integer
          description: Estimated generation time in seconds
      required:
        - jobId
        - message

    PPTJobStatus:
      type: object
      properties:
        jobId:
          type: string
        status:
          type: string
          enum: [pending, planning, outline_ready, generating, building, completed, failed]
        progress:
          type: integer
          description: Progress percentage 0-100
        currentStep:
          type: string
          description: Current processing step description
        outline:
          type: array
          description: Generated slide outline
          items:
            $ref: "#/components/schemas/SlideOutlineItem"
        themePreset:
          type: string
        primaryColor:
          type: string
        downloadUrl:
          type: string
          description: URL to download completed file
        error:
          type: string
          description: Error message if failed
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
      required:
        - jobId
        - status
        - progress

    SlideOutlineItem:
      type: object
      properties:
        slideNumber:
          type: integer
        title:
          type: string
        keyPoints:
          type: array
          items:
            type: string
        notes:
          type: string
        slideType:
          type: string
          enum: [title, content, section, conclusion, qa]
        visualType:
          type: string
          enum: [chart, stats, process, comparison, icon-grid, text-only]
        chartData:
          $ref: "#/components/schemas/ChartData"
      required:
        - slideNumber
        - title

    ChartSeries:
      type: object
      properties:
        name:
          type: string
        values:
          type: array
          items:
            type: number
      required:
        - name
        - values

    ChartData:
      type: object
      properties:
        chartType:
          type: string
          enum: [bar, pie, line, donut, area]
        title:
          type: string
        labels:
          type: array
          items:
            type: string
        series:
          type: array
          items:
            $ref: "#/components/schemas/ChartSeries"
      required:
        - chartType
        - title
        - labels
        - series

    ExportPPTRequest:
      type: object
      properties:
        jobId:
          type: string
        style:
          type: string
        themePreset:
          type: string
        primaryColor:
          type: string
        outline:
          type: object
          properties:
            presentationTitle:
              type: string
            theme:
              type: string
            slides:
              type: array
              items:
                $ref: "#/components/schemas/SlideOutlineItem"
          required:
            - slides
      required:
        - jobId
        - outline

    ContinuePPTRequest:
      type: object
      properties:
        jobId:
          type: string
        style:
          type: string
          default: professional
        themePreset:
          type: string
        primaryColor:
          type: string
        outline:
          type: object
          properties:
            presentationTitle:
              type: string
            theme:
              type: string
            slides:
              type: array
              items:
                $ref: "#/components/schemas/SlideOutlineItem"
          required:
            - slides
      required:
        - jobId
        - outline

    RegenerateSlideRequest:
      type: object
      properties:
        jobId:
          type: string
        slideNumber:
          type: integer
        mode:
          type: string
          enum: [content, content-and-notes, content-notes-and-chart]
        style:
          type: string
        themePreset:
          type: string
        primaryColor:
          type: string
        outline:
          type: object
          properties:
            presentationTitle:
              type: string
            theme:
              type: string
            slides:
              type: array
              items:
                $ref: "#/components/schemas/SlideOutlineItem"
          required:
            - slides
      required:
        - jobId
        - slideNumber
        - mode
        - outline

    PPTHistoryItem:
      type: object
      properties:
        jobId:
          type: string
        topic:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        downloadUrl:
          type: string
      required:
        - jobId
        - topic
        - status
        - createdAt

    PPTHistoryResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PPTHistoryItem"
      required:
        - items

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message
